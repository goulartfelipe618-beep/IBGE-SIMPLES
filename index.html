<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brasil · Estados & Municípios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-grid"></div>

  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">🗺️</span>
        <div>
          <h1>Brasil<span class="dot">.</span></h1>
          <p class="subtitle">Estados &amp; Municípios</p>
        </div>
      </div>
      <div class="stats-bar">
        <div class="stat">
          <span class="stat-num" id="total-states">—</span>
          <span class="stat-label">Estados</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <span class="stat-num" id="total-cities">—</span>
          <span class="stat-label">Municípios</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <span class="stat-num" id="total-done">0</span>
          <span class="stat-label">Concluídos</span>
        </div>
      </div>
    </div>
  </header>

  <main>
    <div class="controls">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="search-input" placeholder="Buscar estado ou município…" />
      </div>
      <div class="filter-tabs">
        <button class="tab active" data-filter="all">Todos</button>
        <button class="tab" data-filter="pending">Pendentes</button>
        <button class="tab" data-filter="done">Concluídos</button>
      </div>
    </div>

    <div id="states-container" class="states-grid">
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Carregando estados…</p>
      </div>
    </div>
  </main>

  <!-- Modal principal de municípios -->
  <div id="modal" class="modal hidden">
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div class="modal-box">
      <div class="modal-header">
        <div>
          <p class="modal-region" id="modal-region"></p>
          <h2 id="modal-title"></h2>
        </div>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="modal-actions">
        <div class="modal-search-wrap">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="city-search" placeholder="Buscar município…" />
        </div>
        <button class="btn-mark-all" id="btn-mark-all">Marcar todos</button>
      </div>
      <div id="cities-container" class="cities-list">
        <div class="loading-state">
          <div class="spinner"></div>
          <p>Carregando municípios…</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal de Região (para cidades +300k) -->
  <div id="regiao-modal" class="regiao-modal hidden">
    <div class="regiao-modal-box">
      <div class="regiao-modal-header">
        <div>
          <p class="regiao-modal-sub">Cidade com +300k habitantes</p>
          <h3 id="regiao-city-name"></h3>
        </div>
        <button class="modal-close" id="regiao-modal-close">✕</button>
      </div>
      <p class="regiao-modal-label">Selecione a região onde os dados foram coletados:</p>
      <div class="regiao-grid">
        <button class="regiao-opt" data-regiao="Norte">⬆️ Norte</button>
        <button class="regiao-opt" data-regiao="Sul">⬇️ Sul</button>
        <button class="regiao-opt" data-regiao="Leste">➡️ Leste</button>
        <button class="regiao-opt" data-regiao="Oeste">⬅️ Oeste</button>
      </div>
      <p class="regiao-modal-error" id="regiao-modal-error">Selecione uma região para continuar</p>
      <button class="regiao-confirmar" id="regiao-confirmar">✓ Confirmar</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
